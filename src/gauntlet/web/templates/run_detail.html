{% extends "base.html" %}
{% block title %}{{ slug }} · Gauntlet Console{% endblock %}
{% block body %}
<p><a href="/{% if token %}?token={{ token }}{% endif %}">← all runs</a></p>
<h1>{{ slug }}</h1>
<div id="run-detail" data-live-src="/partials/runs/{{ slug }}?run_id={{ manifest.run_id }}{% if token %}&token={{ token }}{% endif %}">
  {% include "_run_detail_body.html" %}
</div>
{% endblock %}
