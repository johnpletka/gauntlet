<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Gauntlet Console{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/{% if token %}?token={{ token }}{% endif %}">Gauntlet Console</a>
  </header>
  <main>
    {% block body %}{% endblock %}
  </main>
</body>
</html>
